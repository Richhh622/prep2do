// 判斷顏色深淺，深色背景用白字
function isDark(hex){
  const h=hex.replace("#","");
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return (r*0.299+g*0.587+b*0.114)<128;
}
function applyTheme(c){
  document.body.style.background=c;
  const dark=isDark(c);
  const textColor=dark?"#fff":"#1a1a2e";
  const subColor=dark?"rgba(255,255,255,0.6)":"#888";
  const borderColor=dark?"rgba(255,255,255,0.2)":"rgba(0,0,0,0.06)";
  document.documentElement.style.setProperty("--text",textColor);
  document.documentElement.style.setProperty("--sub",subColor);
  document.documentElement.style.setProperty("--border",borderColor);
  document.documentElement.style.setProperty("--card-bg",dark?"rgba(255,255,255,0.12)":"#fff");
  document.documentElement.style.setProperty("--btn-bg",dark?"rgba(255,255,255,0.15)":"rgba(0,0,0,0.07)");
  document.documentElement.style.setProperty("--btn-color",dark?"#fff":"#555");
}

async function uploadToCloudinary(file){
  const fd=new FormData();
  fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:"POST",body:fd});
  const d=await res.json();
  if(d.secure_url)return d.secure_url;
  throw new Error(d.error?.message||"fail");
}
async function fetchRates(){
  try{const r=await fetch("https://open.er-api.com/v6/latest/TWD");const d=await r.json();if(d.rates){rates.KRW=d.rates.KRW||32;rates.JPY=d.rates.JPY||4.7;rates.USD=1/(d.rates.USD||0.032);rates.EUR=1/(d.rates.EUR||0.029);rates.CNY=1/(d.rates.CNY||0.22);}}catch(e){}
}
function toTWD(amount,currency){
  const n=Number(amount);if(!n||!currency)return "";
  let tv=0;
  if(currency==="KRW")tv=n/rates.KRW;
  else if(currency==="JPY")tv=n/rates.JPY;
  else if(currency==="USD")tv=n*rates.USD;
  else if(currency==="EUR")tv=n*rates.EUR;
  else if(currency==="CNY")tv=n*rates.CNY;
  return tv?`≈ NT$${Math.round(tv).toLocaleString()}`:"";
}

function readItemFields(){
  modalData.name=document.getElementById("m-item-name")?.value||modalData.name||"";
  modalData.price=document.getElementById("m-price")?.value||modalData.price||"";
  modalData.currency=document.getElementById("m-currency")?.value||modalData.currency||"KRW";
  modalData.note=document.getElementById("m-note")?.value||modalData.note||"";
}
function bindModal(){
  const bg=document.getElementById("modal-bg");
  if(bg)bg.onclick=e=>{if(e.target.id==="modal-bg"){modal=null;imgUploading=false;render();}};
  const mc=document.getElementById("m-cancel");
  if(mc)mc.onclick=()=>{modal=null;imgUploading=false;render();};
  document.querySelectorAll(".emoji-opt").forEach(el=>el.onclick=()=>{
    modalData.name=document.getElementById("m-name")?.value||modalData.name;
    modalData.emoji=el.dataset.emoji;render();
    setTimeout(()=>{const i=document.getElementById("m-name");if(i){i.focus();i.value=modalData.name;}},0);
  });
  const ms=document.getElementById("m-save");
  if(ms)ms.onclick=()=>{
    if(modal==="new-list"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";createList();}
    else if(modal==="edit-list"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";editList();}
    else if(modal==="add-store"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";addStore();}
    else if(modal==="edit-store"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";editStore();}
    else if(modal==="add-cat"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";addCat();}
    else if(modal==="edit-cat"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";editCat();}
    else if(modal==="add-item"||modal==="edit-item"){readItemFields();modal==="edit-item"?editItem():addItemFn();}
  };
  const iub=document.getElementById("img-upload-btn");
  if(iub)iub.onclick=()=>{
    readItemFields();
    const inp=document.getElementById("img-file-input");
    inp.onchange=async e=>{
      const f=e.target.files&&e.target.files[0];if(!f)return;
      inp.value="";imgUploading=true;render();
      try{const url=await uploadToCloudinary(f);modalData.image=url;}
      catch(err){showToast(t().uploadFail);}
      finally{imgUploading=false;render();}
    };
    inp.click();
  };
  const irb=document.getElementById("img-remove-btn");
  if(irb)irb.onclick=()=>{readItemFields();modalData.image="";render();};
  const pi=document.getElementById("m-price");
  const cs=document.getElementById("m-currency");
  const updTWD=()=>{const el=document.getElementById("twd-preview");if(el)el.textContent=toTWD(pi?.value,cs?.value||"KRW");};
  if(pi)pi.oninput=updTWD;
  if(cs)cs.onchange=updTWD;
  const cb=document.getElementById("copy-btn");
  if(cb)cb.onclick=()=>navigator.clipboard.writeText(`${location.origin}${location.pathname}?join=${currentList.id}`).then(()=>showToast(t().copied));
  setTimeout(()=>{const i=document.getElementById("m-name")||document.getElementById("m-item-name");if(i)i.focus();},50);
}

// ── DATA OPS ──
async function saveList(){
  if(!currentList)return;
  try{await updateDoc(doc(db,"lists",currentList.id),{stores:currentList.stores||[],updatedAt:serverTimestamp()});}
  catch(e){showToast(t().saveFail+": "+e.code);}
}
async function createList(){
  if(!modalData.name){showToast(t().enterListName);return;}
  try{
    await addDoc(collection(db,"lists"),{name:modalData.name,emoji:modalData.emoji||"🛒",ownerId:user.uid,ownerName:user.displayName||"",members:[user.uid],stores:[],createdAt:serverTimestamp()});
    modal=null;showToast(t().created);render();
  }catch(e){showToast(t().createFail+": "+e.code);}
}
async function editList(){
  if(!modalData.name){showToast(t().enterListName);return;}
  currentList.name=modalData.name;currentList.emoji=modalData.emoji;
  try{await updateDoc(doc(db,"lists",currentList.id),{name:modalData.name,emoji:modalData.emoji});}
  catch(e){showToast(t().saveFail);}
  modal=null;render();
}
async function openList(id){
  try{
    const snap=await getDoc(doc(db,"lists",id));
    if(!snap.exists()){showToast("Not found");return;}
    currentList={id:snap.id,...snap.data()};
    currentList.stores=currentList.stores||[];
    activeStoreIdx=0;modal=null;render();
  }catch(e){showToast(t().openFail+": "+e.code);}
}
function addStore(){
  if(!modalData.name){showToast(t().enterStoreName);return;}
  currentList.stores=currentList.stores||[];
  currentList.stores.push({name:modalData.name,emoji:modalData.emoji||"🛒",categories:[]});
  activeStoreIdx=currentList.stores.length-1;
  modal=null;saveList();render();
}
function editStore(){
  if(!modalData.name){showToast(t().enterStoreName);return;}
  const s=currentList.stores[activeStoreIdx];
  s.name=modalData.name;s.emoji=modalData.emoji||s.emoji;
  modal=null;saveList();render();
}
function delStore(){
  currentList.stores.splice(activeStoreIdx,1);
  activeStoreIdx=Math.max(0,activeStoreIdx-1);
  saveList();render();
}
function addCat(){
  if(!modalData.name){showToast(t().enterCatName);return;}
  const s=currentList.stores[activeStoreIdx];
  s.categories=s.categories||[];
  s.categories.push({name:modalData.name,items:[]});
  modal=null;saveList();render();
}
function editCat(){
  if(!modalData.name){showToast(t().enterCatName);return;}
  currentList.stores[activeStoreIdx].categories[modalData.ci].name=modalData.name;
  modal=null;saveList();render();
}
function delCat(ci){
  currentList.stores[activeStoreIdx].categories.splice(ci,1);
  saveList();render();
}
function addItemFn(){
  if(!modalData.name){showToast(t().enterItemName);return;}
  const cat=currentList.stores[activeStoreIdx].categories[modalData.ci];
  cat.items=cat.items||[];
  cat.items.push({name:modalData.name,image:modalData.image||"",price:modalData.price||"",currency:modalData.currency||"KRW",note:modalData.note||"",done:false});
  modal=null;saveList();render();
}
function editItem(){
  if(!modalData.name){showToast(t().enterItemName);return;}
  const cat=currentList.stores[activeStoreIdx].categories[modalData.ci];
  const old=cat.items[modalData.ii];
  cat.items[modalData.ii]={name:modalData.name,image:modalData.image||"",price:modalData.price||"",currency:modalData.currency||"KRW",note:modalData.note||"",done:old.done||false};
  modal=null;saveList();render();
}
function delItem(ci,ii){
  currentList.stores[activeStoreIdx].categories[ci].items.splice(ii,1);
  saveList();render();
}
function toggleItem(ci,ii){
  const cat=currentList.stores[activeStoreIdx].categories[ci];
  const item=cat.items[ii];
  item.done=!item.done;
  // 勾選後移到最後，取消勾選移回最前
  cat.items.splice(ii,1);
  if(item.done) cat.items.push(item);
  else cat.items.unshift(item);
  saveList();render();
}
async function delList(){
  if(!confirm(t().delListConfirm))return;
  try{
    await deleteDoc(doc(db,"lists",currentList.id));
    currentList=null;modal=null;showToast(t().deleted);render();
  }catch(e){showToast(t().delFail);}
}
async function handleJoin(id){
  try{
    await updateDoc(doc(db,"lists",id),{members:arrayUnion(user.uid)});
    showToast(t().joined);history.replaceState({},"",location.pathname);openList(id);
  }catch(e){showToast(t().joinFail);}
}
function subLists(){
  if(unsubLists)unsubLists();
  unsubLists=onSnapshot(query(collection(db,"lists"),where("members","array-contains",user.uid)),snap=>{
    lists=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(!currentList)render();
  });
}
function showToast(msg){toast=msg;if(toastT)clearTimeout(toastT);render();toastT=setTimeout(()=>{toast=null;render();},3000);}

onAuthStateChanged(auth,async u=>{
  user=u;
  if(u){fetchRates();subLists();const j=new URLSearchParams(location.search).get("join");if(j)await handleJoin(j);}
  else{if(unsubLists){unsubLists();unsubLists=null;}lists=[];currentList=null;}
  render();
});
</script>
</body>
</html>
