<style>

.item-del-btn{padding:5px 8px;border-radius:8px;border:none;font-size:13px;background:#fff0f0;color:#e05555;}

.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:800;color:#1a1a2e;margin-bottom:18px;}
.field-label{font-size:11px;font-weight:700;color:#aaa;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
.field-input{width:100%;padding:11px 14px;border-radius:12px;border:2px solid #e8e8e8;font-size:14px;margin-bottom:13px;transition:border-color 0.2s;}
.field-input:focus{outline:none;border-color:#1a1a2e;}
.field-select{width:100%;padding:11px 14px;border-radius:12px;border:2px solid #e8e8e8;font-size:14px;margin-bottom:13px;background:#fff;}
.img-upload-row{display:flex;gap:12px;align-items:center;margin-bottom:13px;}
.img-preview{width:72px;height:72px;border-radius:12px;border:2px dashed #e0e0e0;background:#fafafa;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;cursor:pointer;flex-shrink:0;}
.img-preview img{width:100%;height:100%;object-fit:cover;}
.img-btns{display:flex;flex-direction:column;gap:6px;}
.img-upload-btn{padding:9px 18px;border-radius:12px;border:none;background:#f0f0f0;color:#555;font-size:13px;font-weight:600;}
.img-remove-btn{padding:7px 12px;border-radius:12px;border:none;background:#fff0f0;color:#e05555;font-size:12px;font-weight:600;}
.price-twd-preview{font-size:12px;color:#e05555;margin-bottom:13px;margin-top:-8px;font-weight:600;min-height:16px;}
.modal-btns{display:flex;gap:10px;margin-top:6px;}
.modal-save{flex:1;padding:13px;border-radius:14px;border:none;background:#1a1a2e;color:#fff;font-size:15px;font-weight:700;}
.modal-cancel{flex:1;padding:13px;border-radius:14px;border:2px solid #e8e8e8;background:#fff;color:#aaa;font-size:15px;font-weight:600;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.emoji-opt{width:40px;height:40px;border-radius:10px;border:2px solid #e8e8e8;background:#fafafa;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.emoji-opt.sel{border-color:#1a1a2e;background:#f0f0f0;}
.theme-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.theme-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s;}
.theme-dot.sel{border-color:#1a1a2e;transform:scale(1.15);}
.share-box{background:#f8f8f8;border-radius:12px;padding:12px 14px;font-size:13px;color:#555;word-break:break-all;margin-bottom:14px;}
.copy-btn{width:100%;padding:13px;border-radius:14px;border:none;background:#1a1a2e;color:#fff;font-size:15px;font-weight:700;margin-bottom:10px;}
.user-menu{position:fixed;top:58px;right:12px;background:#fff;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.15);padding:8px;z-index:200;min-width:180px;}
.user-menu-email{padding:8px 14px;font-size:12px;color:#aaa;border-bottom:1px solid #f0f0f0;margin-bottom:4px;}
.user-menu-item{padding:11px 14px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;color:#333;}
.user-menu-item:hover{background:#f5f5f5;}
.user-menu-item.danger{color:#e05555;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 22px;border-radius:30px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;}
.total-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #f0f0f0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:50;}
.total-label{font-size:12px;color:#aaa;font-weight:600;}
.total-amount{font-size:16px;font-weight:800;color:#1a1a2e;}
.total-twd{font-size:12px;color:#e05555;}
</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="img-file-input" accept="image/*" style="display:none"/>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, getDoc, updateDoc, deleteDoc, onSnapshot, arrayUnion, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const FB={apiKey:"AIzaSyCjjVsi8MZoeiTLMN-6Ju8_SSUbh97aaTM",authDomain:"my-lists-app-1acff.firebaseapp.com",projectId:"my-lists-app-1acff",storageBucket:"my-lists-app-1acff.firebasestorage.app",messagingSenderId:"36330666849",appId:"1:36330666849:web:5cc74e9d21c196dd592320"};
const fbApp=initializeApp(FB);
const auth=getAuth(fbApp);
const db=getFirestore(fbApp);

let user=null,lists=[],currentList=null,activeStoreIdx=0;
let modal=null,modalData={};
let menuOpen=false,themeModal=false;
let toast=null,toastT=null;
let unsubLists=null,unsubDetail=null;
let rates={KRW:32,JPY:4.7,USD:31.5,EUR:34,CNY:4.4};

const THEMES=["#FCFDFD","#E7D5E3","#A0B1DE","#FDD3D9","#F2EDE9","#DECBBB","#DFEDF3","#DFE1E7","#DAF0FE","#FFDCE3"];
const EMOJIS=["🛒","🇰🇷","🇯🇵","🇹🇼","🇺🇸","🛍️","💄","💊","🏕️","🎄","🎓","🏠","🐶","🍰","☕","✈️","🏖️","🎁","📦","🏋️","📚","🌏","🎀","🧴"];
const CURRENCIES=[{v:"KRW",l:"韓元 ₩"},{v:"JPY",l:"日圓 ¥"},{v:"USD",l:"美元 $"},{v:"EUR",l:"歐元 €"},{v:"CNY",l:"人民幣 ¥"}];
const CSYM={KRW:"₩",JPY:"¥",USD:"$",EUR:"€",CNY:"¥"};

const userTheme=()=>localStorage.getItem("theme")||"#F2EDE9";
const setTheme=c=>{localStorage.setItem("theme",c);document.body.style.background=c;};

async function fetchRates(){
  try{
    const r=await fetch("https://open.er-api.com/v6/latest/TWD");
    const d=await r.json();
    if(d.rates){
      rates.KRW=d.rates.KRW||32;
      rates.JPY=d.rates.JPY||4.7;
      rates.USD=1/(d.rates.USD||0.032);
      rates.EUR=1/(d.rates.EUR||0.029);
      rates.CNY=1/(d.rates.CNY||0.22);
    }
  }catch(e){}
}
function toTWD(amount,currency){
  const n=Number(amount); if(!n||!currency) return "";
  let twd=0;
  if(currency==="KRW") twd=n/rates.KRW;
  else if(currency==="JPY") twd=n/rates.JPY;
  else if(currency==="USD") twd=n*rates.USD;
  else if(currency==="EUR") twd=n*rates.EUR;
  else if(currency==="CNY") twd=n*rates.CNY;
  return twd?`≈ NT$${Math.round(twd).toLocaleString()}`:"";
}

// ── RENDER ──
function render(){
  document.body.style.background=userTheme();
  const root=document.getElementById("root");
  if(!user){root.innerHTML=renderLogin();bindLogin();return;}
  if(!currentList){root.innerHTML=renderHome();bindHome();return;}
  root.innerHTML=renderDetail();bindDetail();
}

// LOGIN
function renderLogin(){
  return `<div class="login-wrap"><div class="login-card">
    <div class="login-logo">✨</div>
    <div class="login-title">My Lists</div>
    <div class="login-sub">旅行、採買、任何事<br>一個地方管理所有清單</div>
    <button class="google-btn" id="g-login">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 登入
    </button>
  </div></div>`;
}
function bindLogin(){document.getElementById("g-login").onclick=()=>signInWithPopup(auth,new GoogleAuthProvider()).catch(()=>showToast("登入失敗"));}

// HOME
function renderHome(){
  const name=(user.displayName||"").split(" ")[0];
  const myLists=lists.filter(l=>l.ownerId===user.uid);
  const sharedLists=lists.filter(l=>l.ownerId!==user.uid);
  const av=user.photoURL?`<img class="avatar" src="${user.photoURL}" id="av-btn">`:`<div class="avatar-ph" id="av-btn">👤</div>`;
  return `
  <div class="header"><div class="header-title">✨ My Lists</div>
    <div class="header-right"><button class="theme-btn" id="theme-open-btn">🎨</button>${av}</div>
  </div>
  <div class="home-wrap">
    <div class="greeting"><h2>Hi, ${name} 👋</h2><p>你有 ${myLists.length} 份清單</p></div>
    <div class="section-label">我的清單</div>
    <div class="lists-grid">
      ${myLists.map(l=>renderListCard(l)).join("")}
      <div class="new-card" id="new-list-btn"><div class="new-card-icon">＋</div><div class="new-card-label">新增清單</div></div>
    </div>
    ${sharedLists.length?`<div class="section-label">共享給我的</div><div class="lists-grid">${sharedLists.map(l=>renderListCard(l,true)).join("")}</div>`:""}
  </div>
  ${menuOpen?renderUserMenu():""}
  ${themeModal?renderThemeModal():""}
  ${modal?renderModal():""}
  ${toast?`<div class="toast">${toast}</div>`:""}`;
}
function renderListCard(l,shared){
  const stores=l.stores||[];
  const total=stores.reduce((a,s)=>a+(s.categories||[]).reduce((b,c)=>b+(c.items||[]).length,0),0);
  return `<div class="list-card" data-lid="${l.id}">
    ${shared?'<div class="shared-badge">共享</div>':""}
    <div class="list-card-emoji">${l.emoji||"📋"}</div>
    <div class="list-card-name">${l.name}</div>
    <div class="list-card-meta">${stores.length} 店家 · ${total} 商品</div>
  </div>`;
}
function renderUserMenu(){
  return `<div class="user-menu" id="u-menu">
    <div class="user-menu-email">${user.email}</div>
    <div class="user-menu-item danger" id="logout-btn">登出</div>
  </div>`;
}
function renderThemeModal(){
  return `<div class="modal-bg" id="theme-modal-bg"><div class="modal">
    <div class="modal-title">🎨 選擇主題顏色</div>
    <div class="theme-grid">${THEMES.map(c=>`<div class="theme-dot ${userTheme()===c?'sel':''}" style="background:${c}" data-color="${c}"></div>`).join("")}</div>
    <div class="modal-btns"><button class="modal-cancel" id="theme-close">關閉</button></div>
  </div></div>`;
}
function bindHome(){
  document.querySelectorAll(".list-card").forEach(el=>el.onclick=()=>openList(el.dataset.lid));
  document.getElementById("new-list-btn").onclick=()=>{modal="new-list";modalData={name:"",emoji:"🛒"};render();};
  const av=document.getElementById("av-btn");
  if(av) av.onclick=e=>{e.stopPropagation();menuOpen=!menuOpen;themeModal=false;render();};
  document.getElementById("theme-open-btn").onclick=e=>{e.stopPropagation();themeModal=!themeModal;menuOpen=false;render();};
  if(menuOpen){
    document.getElementById("logout-btn").onclick=()=>{signOut(auth);menuOpen=false;};
    setTimeout(()=>{document.onclick=e=>{if(!document.getElementById("u-menu")?.contains(e.target)){menuOpen=false;render();document.onclick=null;}};},0);
  }
  if(themeModal){
    document.getElementById("theme-modal-bg").onclick=e=>{if(e.target.id==="theme-modal-bg"){themeModal=false;render();}};
    document.getElementById("theme-close").onclick=()=>{themeModal=false;render();};
    document.querySelectorAll(".theme-dot").forEach(el=>el.onclick=()=>{setTheme(el.dataset.color);render();});
  }
  if(modal) bindModal();
}

// DETAIL
function renderDetail(){
  const l=currentList;
  const stores=l.stores||[];
  const store=stores[activeStoreIdx]||stores[0];
  const isOwner=l.ownerId===user.uid;
  const totalKRW=stores.reduce((a,s)=>(s.categories||[]).reduce((b,c)=>(c.items||[]).filter(i=>i.currency==="KRW").reduce((x,i)=>x+(Number(i.price)||0),b),a),0);
  const av=user.photoURL?`<img class="avatar" src="${user.photoURL}" id="av-btn">`:`<div class="avatar-ph" id="av-btn">👤</div>`;

  return `
  <div class="header">
    <button class="back-btn" id="back-btn">← 返回</button>
    <div class="header-right"><button class="theme-btn" id="theme-open-btn">🎨</button>${av}</div>
  </div>
  <div class="detail-wrap">
    <div class="detail-top">
      <div class="detail-emoji">${l.emoji||"📋"}</div>
      <div class="detail-name">${l.name}</div>
      <div class="detail-meta">${stores.length} 店家</div>
      <div class="detail-actions">
        ${isOwner?`<button class="detail-action-btn" id="edit-list-btn">✏️ 編輯名稱</button>`:""}
        ${isOwner?`<button class="detail-action-btn" id="share-btn">🔗 分享</button>`:""}
        ${isOwner?`<button class="detail-action-btn danger-action" id="del-list-btn">🗑 刪除</button>`:""}
      </div>
    </div>
    <div class="stores-scroll">
      ${stores.map((s,i)=>`<button class="store-tab ${i===activeStoreIdx?'active':''}" data-si="${i}">${s.emoji||""} ${s.name}</button>`).join("")}
      <button class="add-store-tab" id="add-store-btn">＋ 店家</button>
    </div>
    ${store?`
    <div class="store-body">
      <div class="store-header">
        <div class="store-title">${store.emoji||""} ${store.name}</div>
        <div class="store-header-btns">
          <button class="sm-btn" id="edit-store-btn">✏️</button>
          <button class="sm-btn" id="add-cat-btn">＋ 分類</button>
          <button class="sm-btn danger-sm" id="del-store-btn">🗑</button>
        </div>
      </div>
      ${(store.categories||[]).map((cat,ci)=>`
      <div class="cat-block">
        <div class="cat-header">
          <div class="cat-name">${cat.name}</div>
          <div class="cat-btns">
            <button class="cat-add-btn" data-ci="${ci}">＋ 商品</button>
            <button class="cat-edit-btn" data-editci="${ci}">✏️</button>
            <button class="cat-del-btn" data-delci="${ci}">🗑</button>
          </div>
        </div>
        ${!(cat.items&&cat.items.length)?`<div class="cat-empty">點「＋ 商品」新增</div>`:
          cat.items.map((item,ii)=>`
          <div class="item-row">
            <div class="item-check ${item.done?'done':''}" data-ci="${ci}" data-ii="${ii}" data-toggle="1">
              ${item.done?`<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="2,5.5 4.5,8 9,3" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>`:""}
            </div>
            <div class="item-img">${item.image?`<img src="${item.image}" onerror="this.parentElement.innerHTML='🛒'">`:"🛒"}</div>
            <div class="item-info">
              <div class="item-name ${item.done?'done':''}">${item.name}</div>
              ${item.price?`<div class="item-price">${CSYM[item.currency]||""}${Number(item.price).toLocaleString()}</div><div class="item-twd">${toTWD(item.price,item.currency)}</div>`:""}
              ${item.note?`<div class="item-note">📝 ${item.note}</div>`:""}
            </div>
            <div class="item-row-btns">
              <button class="item-edit-btn" data-ci="${ci}" data-ii="${ii}" data-edititem="1">✏️</button>
              <button class="item-del-btn" data-ci="${ci}" data-deli="${ii}">🗑</button>
            </div>
          </div>`).join("")}
      </div>`).join("")}
    </div>`:`<div style="padding:40px;text-align:center;color:#bbb;font-size:14px;">點「＋ 店家」新增第一間店</div>`}
  </div>
  ${totalKRW?`<div class="total-bar"><div><div class="total-label">韓元預估總計</div><div class="total-twd">${toTWD(totalKRW,"KRW")}</div></div><div class="total-amount">₩${totalKRW.toLocaleString()}</div></div>`:""}
  ${themeModal?renderThemeModal():""}
  ${modal?renderModal():""}
  ${toast?`<div class="toast">${toast}</div>`:""}`;
}

function bindDetail(){
  document.getElementById("back-btn").onclick=()=>{
    currentList=null;activeStoreIdx=0;modal=null;
    if(unsubDetail){unsubDetail();unsubDetail=null;}
    render();
  };
  document.getElementById("theme-open-btn").onclick=e=>{e.stopPropagation();themeModal=!themeModal;render();};
  const av=document.getElementById("av-btn");
  if(av) av.onclick=e=>{e.stopPropagation();menuOpen=!menuOpen;render();};

  document.querySelectorAll(".store-tab").forEach(el=>el.onclick=()=>{activeStoreIdx=parseInt(el.dataset.si);modal=null;render();});
  document.getElementById("add-store-btn").onclick=()=>{modal="add-store";modalData={name:"",emoji:"🛒"};render();};

  const elb=document.getElementById("edit-list-btn");
  if(elb) elb.onclick=()=>{modal="edit-list";modalData={name:currentList.name,emoji:currentList.emoji||"🛒"};render();};
  const sb=document.getElementById("share-btn");
  if(sb) sb.onclick=()=>{modal="share";render();};
  const dlb=document.getElementById("del-list-btn");
  if(dlb) dlb.onclick=()=>delList();

  const store=(currentList.stores||[])[activeStoreIdx];
  if(store){
    document.getElementById("edit-store-btn").onclick=()=>{modal="edit-store";modalData={name:store.name,emoji:store.emoji||"🛒"};render();};
    document.getElementById("add-cat-btn").onclick=()=>{modal="add-cat";modalData={name:""};render();};
    document.getElementById("del-store-btn").onclick=()=>{if(confirm(`刪除「${store.name}」？`))delStore();};
    document.querySelectorAll("[data-ci].cat-add-btn").forEach(el=>el.onclick=()=>{modal="add-item";modalData={ci:parseInt(el.dataset.ci),name:"",currency:"KRW",price:"",note:"",image:""};render();});
    document.querySelectorAll("[data-editci]").forEach(el=>el.onclick=()=>{const ci=parseInt(el.dataset.editci);modal="edit-cat";modalData={ci,name:store.categories[ci].name};render();});
    document.querySelectorAll("[data-delci]").forEach(el=>el.onclick=()=>{if(confirm("刪除此分類？"))delCat(parseInt(el.dataset.delci));});
    document.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=()=>toggleItem(parseInt(el.dataset.ci),parseInt(el.dataset.ii)));
    document.querySelectorAll("[data-edititem]").forEach(el=>el.onclick=()=>{
      const ci=parseInt(el.dataset.ci),ii=parseInt(el.dataset.ii);
      const item=store.categories[ci].items[ii];
      modal="edit-item";modalData={ci,ii,name:item.name,image:item.image||"",price:item.price||"",currency:item.currency||"KRW",note:item.note||""};render();
    });
    document.querySelectorAll("[data-deli]").forEach(el=>el.onclick=()=>delItem(parseInt(el.dataset.ci),parseInt(el.dataset.deli)));
  }
  if(themeModal){
    document.getElementById("theme-modal-bg").onclick=e=>{if(e.target.id==="theme-modal-bg"){themeModal=false;render();}};
    document.getElementById("theme-close").onclick=()=>{themeModal=false;render();};
    document.querySelectorAll(".theme-dot").forEach(el=>el.onclick=()=>{setTheme(el.dataset.color);render();});
  }
  if(modal) bindModal();
}

// MODAL RENDER
function renderModal(){
  if(modal==="new-list"||modal==="edit-list"){
    const title=modal==="edit-list"?"✏️ 編輯清單名稱":"✨ 新增清單";
    return `<div class="modal-bg" id="modal-bg"><div class="modal">
      <div class="modal-title">${title}</div>
      <label class="field-label">清單名稱</label>
      <input class="field-input" id="m-name" placeholder="e.g. 韓國旅行" value="${modalData.name||""}"/>
      <label class="field-label">Emoji</label>
      <div class="emoji-grid">${EMOJIS.map(em=>`<div class="emoji-opt ${(modalData.emoji||"🛒")===em?'sel':''}" data-emoji="${em}">${em}</div>`).join("")}</div>
      <div class="modal-btns"><button class="modal-cancel" id="m-cancel">取消</button><button class="modal-save" id="m-save">${modal==="edit-list"?"儲存":"建立"}</button></div>
    </div></div>`;
  }
  if(modal==="add-store"||modal==="edit-store"){
    const title=modal==="edit-store"?"✏️ 編輯店家名稱":"🏪 新增店家";
    return `<div class="modal-bg" id="modal-bg"><div class="modal">
      <div class="modal-title">${title}</div>
      <label class="field-label">店名</label>
      <input class="field-input" id="m-name" placeholder="e.g. Olive Young" value="${modalData.name||""}"/>
      <label class="field-label">Emoji</label>
      <div class="emoji-grid">${EMOJIS.map(em=>`<div class="emoji-opt ${(modalData.emoji||"🛒")===em?'sel':''}" data-emoji="${em}">${em}</div>`).join("")}</div>
      <div class="modal-btns"><button class="modal-cancel" id="m-cancel">取消</button><button class="modal-save" id="m-save">${modal==="edit-store"?"儲存":"新增"}</button></div>
    </div></div>`;
  }
  if(modal==="add-cat"||modal==="edit-cat"){
    return `<div class="modal-bg" id="modal-bg"><div class="modal">
      <div class="modal-title">${modal==="edit-cat"?"✏️ 編輯分類名稱":"📂 新增分類"}</div>
      <label class="field-label">分類名稱</label>
      <input class="field-input" id="m-name" placeholder="e.g. 化妝品類💄" value="${modalData.name||""}"/>
      <div class="modal-btns"><button class="modal-cancel" id="m-cancel">取消</button><button class="modal-save" id="m-save">${modal==="edit-cat"?"儲存":"新增"}</button></div>
    </div></div>`;
  }
  if(modal==="add-item"||modal==="edit-item"){
    const md=modalData;
    const twdStr=toTWD(md.price,md.currency||"KRW");
    return `<div class="modal-bg" id="modal-bg"><div class="modal">
      <div class="modal-title">${modal==="edit-item"?"✏️ 編輯商品":"＋ 新增商品"}</div>
      <label class="field-label">商品名稱</label>
      <input class="field-input" id="m-item-name" placeholder="e.g. 防曬乳 SPF50" value="${md.name||""}"/>
      <label class="field-label">商品圖片</label>
      <div class="img-upload-row">
        <div class="img-preview" id="img-preview-box">${md.image?`<img src="${md.image}">`:"📷"}</div>
        <div class="img-btns">
          <button class="img-upload-btn" id="img-upload-btn">從相簿選擇</button>
          ${md.image?`<button class="img-remove-btn" id="img-remove-btn">移除圖片</button>`:""}
        </div>
      </div>
      <label class="field-label">幣種</label>
      <select class="field-select" id="m-currency">
        ${CURRENCIES.map(c=>`<option value="${c.v}" ${(md.currency||"KRW")===c.v?"selected":""}>${c.l}</option>`).join("")}
      </select>
      <label class="field-label">價格</label>
      <input class="field-input" id="m-price" type="number" placeholder="e.g. 15000" value="${md.price||""}"/>
      <div class="price-twd-preview" id="twd-preview">${twdStr}</div>
      <label class="field-label">備註</label>
      <input class="field-input" id="m-note" placeholder="e.g. 買兩個、限定色" value="${md.note||""}"/>
      <div class="modal-btns"><button class="modal-cancel" id="m-cancel">取消</button><button class="modal-save" id="m-save">儲存</button></div>
    </div></div>`;
  }
  if(modal==="share"){
    const url=`${location.origin}${location.pathname}?join=${currentList.id}`;
    return `<div class="modal-bg" id="modal-bg"><div class="modal">
      <div class="modal-title">🔗 分享清單</div>
      <p style="color:#888;font-size:14px;margin-bottom:14px;">把連結傳給朋友，對方登入後就能一起編輯。</p>
      <div class="share-box">${url}</div>
      <button class="copy-btn" id="copy-btn">複製連結</button>
      <div class="modal-btns"><button class="modal-cancel" id="m-cancel">關閉</button></div>
    </div></div>`;
  }
  return "";
}

// 從 DOM 讀取當前欄位值（解決圖片上傳後欄位被 render 清掉的問題）
function readItemFormFields(){
  modalData.name=document.getElementById("m-item-name")?.value||modalData.name||"";
  modalData.price=document.getElementById("m-price")?.value||modalData.price||"";
  modalData.currency=document.getElementById("m-currency")?.value||modalData.currency||"KRW";
  modalData.note=document.getElementById("m-note")?.value||modalData.note||"";
}

function bindModal(){
  const bg=document.getElementById("modal-bg");
  if(bg) bg.onclick=e=>{if(e.target.id==="modal-bg"){modal=null;render();}};
  const mc=document.getElementById("m-cancel");
  if(mc) mc.onclick=()=>{modal=null;render();};

  document.querySelectorAll(".emoji-opt").forEach(el=>el.onclick=()=>{
    modalData.name=document.getElementById("m-name")?.value||modalData.name;
    modalData.emoji=el.dataset.emoji;
    render();
    setTimeout(()=>{const i=document.getElementById("m-name");if(i){i.focus();i.value=modalData.name;}},0);
  });

  const ms=document.getElementById("m-save");
  if(ms) ms.onclick=()=>{
    if(modal==="new-list"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";createList();}
    else if(modal==="edit-list"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";editList();}
    else if(modal==="add-store"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";addStore();}
    else if(modal==="edit-store"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";editStore();}
    else if(modal==="add-cat"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";addCat();}
    else if(modal==="edit-cat"){modalData.name=document.getElementById("m-name")?.value?.trim()||"";editCat();}
    else if(modal==="add-item"||modal==="edit-item"){readItemFormFields();modal==="edit-item"?editItem():addItemFn();}
  };

  // 圖片上傳：先把所有欄位值存進 modalData，再上傳
  const iub=document.getElementById("img-upload-btn");
  if(iub) iub.onclick=()=>{
    readItemFormFields(); // 存目前欄位值
    const inp=document.getElementById("img-file-input");
    inp.onchange=e=>{
      const f=e.target.files&&e.target.files[0];
      if(!f) return;
      const reader=new FileReader();
      reader.onload=x=>{modalData.image=x.target.result;inp.value="";render();};
      reader.readAsDataURL(f);
    };
    inp.click();
  };
  const irb=document.getElementById("img-remove-btn");
  if(irb) irb.onclick=()=>{readItemFormFields();modalData.image="";render();};

  // 即時換算
  const pi=document.getElementById("m-price");
  const cs=document.getElementById("m-currency");
  const updateTWD=()=>{const p=pi?.value;const c=cs?.value||"KRW";const el=document.getElementById("twd-preview");if(el)el.textContent=toTWD(p,c);};
  if(pi) pi.oninput=updateTWD;
  if(cs) cs.onchange=updateTWD;

  const cb=document.getElementById("copy-btn");
  if(cb) cb.onclick=()=>navigator.clipboard.writeText(`${location.origin}${location.pathname}?join=${currentList.id}`).then(()=>showToast("✅ 連結已複製！"));

  setTimeout(()=>{const i=document.getElementById("m-name")||document.getElementById("m-item-name");if(i)i.focus();},50);
}

// ── DATA OPS ──
// 關鍵：saveList 是唯一寫入 Firebase 的地方，不讓 onSnapshot 干擾編輯中的 state
async function saveList(){
  if(!currentList) return;
  try{
    await updateDoc(doc(db,"lists",currentList.id),{stores:currentList.stores,updatedAt:serverTimestamp()});
  }catch(e){showToast("儲存失敗，請檢查網路");}
}

async function createList(){
  if(!modalData.name){showToast("請輸入清單名稱");return;}
  const ref=await addDoc(collection(db,"lists"),{name:modalData.name,emoji:modalData.emoji||"🛒",ownerId:user.uid,ownerName:user.displayName||"",members:[user.uid],stores:[],createdAt:serverTimestamp()});
  modal=null;showToast("✨ 清單已建立！");render();
}
async function editList(){
  if(!modalData.name){showToast("請輸入清單名稱");return;}
  currentList.name=modalData.name;currentList.emoji=modalData.emoji;
  await updateDoc(doc(db,"lists",currentList.id),{name:modalData.name,emoji:modalData.emoji});
  modal=null;render();
}
async function openList(id){
  const snap=await getDoc(doc(db,"lists",id));
  if(!snap.exists()){showToast("找不到清單");return;}
  currentList={id:snap.id,...snap.data()};
  currentList.stores=currentList.stores||[];
  activeStoreIdx=0;modal=null;

  // 只在首頁清單卡片同步用，detail 不自動覆蓋（避免編輯中被覆蓋）
  if(unsubDetail){unsubDetail();unsubDetail=null;}

  render();
}
function addStore(){
  if(!modalData.name){showToast("請輸入店名");return;}
  currentList.stores=currentList.stores||[];
  currentList.stores.push({name:modalData.name,emoji:modalData.emoji||"🛒",categories:[]});
  activeStoreIdx=currentList.stores.length-1;
  modal=null;saveList();render();
}
function editStore(){
  if(!modalData.name){showToast("請輸入店名");return;}
  const store=currentList.stores[activeStoreIdx];
  store.name=modalData.name;store.emoji=modalData.emoji||store.emoji;
  modal=null;saveList();render();
}
function delStore(){
  currentList.stores.splice(activeStoreIdx,1);
  activeStoreIdx=Math.max(0,activeStoreIdx-1);
  saveList();render();
}
function addCat(){
  if(!modalData.name){showToast("請輸入分類名稱");return;}
  const store=currentList.stores[activeStoreIdx];
  store.categories=store.categories||[];
  store.categories.push({name:modalData.name,items:[]});
  modal=null;saveList();render();
}
function editCat(){
  if(!modalData.name){showToast("請輸入分類名稱");return;}
  const store=currentList.stores[activeStoreIdx];
  store.categories[modalData.ci].name=modalData.name;
  modal=null;saveList();render();
}
function delCat(ci){
  currentList.stores[activeStoreIdx].categories.splice(ci,1);
  saveList();render();
}
function addItemFn(){
  if(!modalData.name){showToast("請輸入商品名稱");return;}
  const store=currentList.stores[activeStoreIdx];
  const cat=store.categories[modalData.ci];
  cat.items=cat.items||[];
  cat.items.push({name:modalData.name,image:modalData.image||"",price:modalData.price||"",currency:modalData.currency||"KRW",note:modalData.note||"",done:false});
  modal=null;saveList();render();
}
function editItem(){
  if(!modalData.name){showToast("請輸入商品名稱");return;}
  const store=currentList.stores[activeStoreIdx];
  const cat=store.categories[modalData.ci];
  const old=cat.items[modalData.ii];
  cat.items[modalData.ii]={name:modalData.name,image:modalData.image||"",price:modalData.price||"",currency:modalData.currency||"KRW",note:modalData.note||"",done:old.done||false};
  modal=null;saveList();render();
}
function delItem(ci,ii){
  currentList.stores[activeStoreIdx].categories[ci].items.splice(ii,1);
  saveList();render();
}
function toggleItem(ci,ii){
  const item=currentList.stores[activeStoreIdx].categories[ci].items[ii];
  item.done=!item.done;
  saveList();render();
}
async function delList(){
  if(!confirm(`刪除「${currentList.name}」？`))return;
  await deleteDoc(doc(db,"lists",currentList.id));
  currentList=null;modal=null;showToast("清單已刪除");render();
}
async function handleJoin(id){
  try{
    await updateDoc(doc(db,"lists",id),{members:arrayUnion(user.uid)});
    showToast("✅ 已加入共享清單！");
    history.replaceState({},"",location.pathname);
    openList(id);
  }catch(e){showToast("無法加入，連結可能已失效");}
}
function subLists(){
  if(unsubLists) unsubLists();
  unsubLists=onSnapshot(query(collection(db,"lists"),where("members","array-contains",user.uid)),snap=>{
    lists=snap.docs.map(d=>({id:d.id,...d.data()}));
    // 只在首頁時重新 render，在 detail 頁只更新清單卡片資料不覆蓋 currentList
    if(!currentList) render();
  });
}
function showToast(msg){toast=msg;if(toastT)clearTimeout(toastT);render();toastT=setTimeout(()=>{toast=null;render();},2500);}

onAuthStateChanged(auth,async u=>{
  user=u;
  if(u){
    fetchRates();subLists();
    const j=new URLSearchParams(location.search).get("join");
    if(j) await handleJoin(j);
  }else{
    if(unsubLists){unsubLists();unsubLists=null;}
    lists=[];currentList=null;
  }
  render();
});
</script>
